<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Microlocal Radar · Cycle</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #000818;
      overflow: hidden;
    }

    #slot-a, #slot-b {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: #000818;
      transition: opacity 1.2s ease;
    }

    #slot-a { z-index: 1; opacity: 1; }
    #slot-b { z-index: 2; opacity: 0; }

    /* ── PAGE INDICATOR DOTS ── */
    #dots {
      position: fixed;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 99;
      pointer-events: none;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(30,100,220,0.35);
      border: 1px solid rgba(30,100,220,0.6);
      transition: background 0.4s ease, transform 0.4s ease;
    }

    .dot.active {
      background: #ffc600;
      border-color: #ffc600;
      transform: scale(1.35);
      box-shadow: 0 0 6px #ffc600;
    }

    /* ── PROGRESS BAR ── */
    #progress {
      position: fixed;
      bottom: 0; left: 0;
      height: 3px;
      width: 0%;
      background: #1e64dc;
      z-index: 99;
      transition: none;
    }

    #progress.running {
      transition: width linear;
    }
  </style>
</head>
<body>

  <iframe id="slot-a" src="" allowfullscreen></iframe>
  <iframe id="slot-b" src="" allowfullscreen></iframe>
  <div id="dots"></div>
  <div id="progress"></div>

  <script>
  // ══════════════════════════════════════════════════════════════
  //  PLAYLIST — edit this list to add / remove / reorder pages.
  //
  //  Each entry is either:
  //    'filename.html'           — a page in this same repo
  //    'https://...'             — a full URL (must allow iframes)
  //
  //  To set a custom hold time for one page, use object form:
  //    { url: 'airquality.html', seconds: 20 }
  //    { url: 'index.html',      seconds: 45 }
  //
  //  Default hold time (used when not specified per-page):
  //  Change DEFAULT_SECONDS below.
  // ══════════════════════════════════════════════════════════════

  const DEFAULT_SECONDS = 30;

  const PLAYLIST = [
    { url: 'index.html',      seconds: 40 },
    { url: 'airquality.html', seconds: 20 },
    // { url: 'weather.html',    seconds: 30 },
    // { url: 'samples.html',    seconds: 30 },
    // { url: 'https://placemakingreport.com/some-page', seconds: 30 },
  ];

  // ── URL PARAM OVERRIDES ───────────────────────────────────────
  // cycle.html?pages=index.html,airquality.html&seconds=45
  const params = new URLSearchParams(location.search);
  if (params.get('pages')) {
    const overrideSeconds = parseFloat(params.get('seconds')) || DEFAULT_SECONDS;
    PLAYLIST.length = 0;
    params.get('pages').split(',').map(p => p.trim()).filter(Boolean)
      .forEach(url => PLAYLIST.push({ url, seconds: overrideSeconds }));
  }

  // Normalize all entries to objects
  const PAGES = PLAYLIST.map(p =>
    typeof p === 'string'
      ? { url: p, seconds: DEFAULT_SECONDS }
      : { url: p.url, seconds: p.seconds ?? DEFAULT_SECONDS }
  );

  const FADE_MS = 1200;

  // ── DOM ───────────────────────────────────────────────────────
  const slotA    = document.getElementById('slot-a');
  const slotB    = document.getElementById('slot-b');
  const dotsEl   = document.getElementById('dots');
  const progressEl = document.getElementById('progress');

  // ── BUILD DOTS ────────────────────────────────────────────────
  PAGES.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.id = 'dot-' + i;
    dotsEl.appendChild(d);
  });

  function setActiveDot(index) {
    document.querySelectorAll('.dot').forEach((d, i) => {
      d.classList.toggle('active', i === index);
    });
  }

  // ── PROGRESS BAR ─────────────────────────────────────────────
  function runProgress(durationMs) {
    progressEl.style.transition = 'none';
    progressEl.style.width = '0%';
    // Force reflow
    void progressEl.offsetWidth;
    progressEl.classList.add('running');
    progressEl.style.transitionDuration = durationMs + 'ms';
    progressEl.style.width = '100%';
  }

  // ── STATE ─────────────────────────────────────────────────────
  let currentIndex = 0;
  let nextIndex    = 1 % PAGES.length;
  let aIsTop       = true;
  let cycleTimer   = null;

  // ── BOOT ──────────────────────────────────────────────────────
  slotA.src          = PAGES[0].url;
  slotA.style.opacity = '1';
  slotA.style.zIndex  = '2';
  slotB.style.opacity = '0';
  slotB.style.zIndex  = '1';

  if (PAGES.length > 1) {
    slotB.src = PAGES[nextIndex].url;
  }

  runProgress(PAGES[0].seconds * 1000);
  scheduleNext(PAGES[0].seconds * 1000);

  // ── CYCLE ─────────────────────────────────────────────────────
  function cycle() {
    if (PAGES.length < 2) return;

    const incoming = aIsTop ? slotB : slotA;
    const outgoing = aIsTop ? slotA : slotB;

    incoming.src           = PAGES[nextIndex].url;
    incoming.style.zIndex  = '3';
    outgoing.style.zIndex  = '2';

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        incoming.style.opacity = '1';
        outgoing.style.opacity = '0';
      });
    });

    setTimeout(() => {
      outgoing.style.zIndex = '1';
      incoming.style.zIndex = '2';
      aIsTop = !aIsTop;

      currentIndex = nextIndex;
      nextIndex    = (nextIndex + 1) % PAGES.length;

      outgoing.src = PAGES[nextIndex].url;

      setActiveDot(currentIndex);
      const holdMs = PAGES[currentIndex].seconds * 1000;
      runProgress(holdMs);
      scheduleNext(holdMs);

    }, FADE_MS + 50);
  }

  function scheduleNext(ms) {
    clearTimeout(cycleTimer);
    cycleTimer = setTimeout(cycle, ms);
  }
  </script>
</body>
</html>
