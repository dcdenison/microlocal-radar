<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Samples · Placemaking Report</title>
<style>
  /* ── PPM DESIGN SPEC v1 ─────────────────────────────
     bg #000000 · text #ffffff · accent #f2ff00
     Courier New only · 2px borders · no radius/shadow/glow
  ──────────────────────────────────────────────────── */
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #000000;
    color: #ffffff;
    font-family: 'Courier New', Courier, monospace;
    overflow: hidden;
    user-select: none;
  }

  /* ── FIXED HEADER ──────────────────────────────────── */
  #header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 10;
    background: #000000;
    border-bottom: 2px solid #f2ff00;
    padding: 14px 18px 12px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
  }

  #header .masthead {
    color: #f2ff00;
    font-size: clamp(13px, 3vw, 18px);
    font-weight: 700;
    letter-spacing: 0.20em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  #header .counter {
    color: rgba(255,255,255,0.75);
    font-size: clamp(10px, 2vw, 12px);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }

  /* ── SLIDE AREA ────────────────────────────────────── */
  #slide {
    position: fixed;
    top: 52px; bottom: 0; left: 0; right: 0;
    display: flex;
    flex-direction: column;
    padding: 18px;
    overflow: hidden;
  }

  .eyebrow {
    color: #f2ff00;
    font-size: clamp(10px, 2.4vw, 13px);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 4px 12px;
  }

  .rule {
    border: none;
    border-top: 1px solid rgba(255,255,255,0.35);
    margin: 12px 0;
  }

  .name {
    color: #f2ff00;
    font-size: clamp(24px, 7vw, 44px);
    font-weight: 700;
    text-transform: uppercase;
    line-height: 1.08;
    margin-bottom: 10px;
  }

  .notes {
    color: #ffffff;
    font-size: clamp(13px, 3.2vw, 17px);
    line-height: 1.5;
  }

  /* ── SIGNIFICANCE LIST ─────────────────────────────── */
  .sig-label {
    color: rgba(255,255,255,0.75);
    font-size: clamp(9px, 2.2vw, 12px);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin: 16px 0 6px;
  }

  .sig-list {
    list-style: none;
  }

  .sig-list li {
    color: #ffffff;
    font-size: clamp(13px, 3.2vw, 17px);
    line-height: 1.45;
    padding-left: 24px;
    position: relative;
    margin-bottom: 6px;
  }

  .sig-list li::before {
    content: "—";
    position: absolute;
    left: 0;
    color: #f2ff00;
  }

  /* ── PHOTO (fills remaining space) ─────────────────── */
  .photo {
    flex: 1;
    min-height: 0;
    margin-top: 16px;
    border: 2px solid #f2ff00;
    background-size: cover;
    background-position: center;
    filter: grayscale(1) contrast(1.1);
  }

  .photo.empty {
    border: 1px solid rgba(255,255,255,0.35);
    display: grid;
    place-items: center;
    color: rgba(255,255,255,0.75);
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    filter: none;
  }

  /* ── STATUS (loading / error) ──────────────────────── */
  #status {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(255,255,255,0.75);
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    z-index: 5;
  }
</style>
</head>
<body>

<div id="header">
  <div class="masthead">Placemaking Report · Samples</div>
  <div class="counter" id="counter">—</div>
</div>

<div id="status">Loading samples…</div>

<div id="slide"></div>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script>
// ── CONFIGURATION ──────────────────────────────────────
// Same Google Sheet CSV that feeds the radar (index.html).
// Sample numbers match the radar's card and active dot —
// both pages number by sheet row order.
//
// "features" column: separate items with semicolons, or one
// per line inside the cell. Rows without features show no list.
//
// Hold time per sample: default below, or override in the URL:
//   samples.html?hold=6
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQZ9tkXhhRDZyHIHrfiLg41w-NIOgDL8oS6fez0yVmBY9tJfBWDIRJ0a4hLrELvAWM1RZSxYDM09Yfg/pub?gid=632827062&single=true&output=csv";

const DEFAULT_HOLD_SECONDS = 8;

const params  = new URLSearchParams(location.search);
const HOLD_MS = (parseFloat(params.get('hold')) || DEFAULT_HOLD_SECONDS) * 1000;

// ── FIELD HELPERS (same logic as the radar) ────────────
function pickField(obj, names, regexes = []) {
  for (const key of Object.keys(obj)) {
    if (names.some(n => n.toLowerCase() === String(key).trim().toLowerCase())) return obj[key];
  }
  for (const key of Object.keys(obj)) {
    if (regexes.some(rx => rx.test(String(key)))) return obj[key];
  }
  return undefined;
}
function toNum(v) {
  const n = parseFloat(String(v ?? "").replace(/[^\d.+-]/g, "").trim());
  return Number.isFinite(n) ? n : NaN;
}
function truthy(v) {
  const s = String(v ?? "").trim().toLowerCase();
  return ['1','true','yes','y','t'].includes(s);
}

function normalizeRow(row) {
  return {
    name:      pickField(row, ["name","title","place"], [/(name|title|place)/i]),
    lat:       toNum(pickField(row, ["lat","latitude"], [/(lat|latitude)/i])),
    lng:       toNum(pickField(row, ["lng","lon","longitude"], [/(lng|lon(gitude)?)/i])),
    notes:     pickField(row, ["notes","desc","description"], [/(notes?|desc(ription)?)/i]),
    image:     pickField(row, ["image","photo","img","thumbnail"], [/(image|photo|img|thumbnail)/i]),
    features:  pickField(row, ["features","significance","highlights"], [/(features?|significance|highlights?)/i]),
    is_center: truthy(pickField(row, ["is_center","center","iscenter"], [/(is_?center)/i])),
  };
}

// ── PARSE FEATURES CELL ────────────────────────────────
function parseFeatures(raw) {
  if (!raw) return [];
  return String(raw)
    .split(/[;\n\r]+/)
    .map(s => s.trim())
    .filter(Boolean);
}

function esc(s) {
  return String(s ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

// ── BUILD ONE FULL-SCREEN SLIDE ────────────────────────
function slideHTML(sample, index) {
  const num = String(index + 1).padStart(3, "0");
  const lat = Number.isFinite(sample.lat) ? sample.lat.toFixed(4) + "° N" : "";
  const lng = Number.isFinite(sample.lng) ? Math.abs(sample.lng).toFixed(4) + "° W" : "";
  const coords = (lat && lng) ? `${lat}&nbsp; ${lng}` : "";

  const label = sample.is_center
    ? `Sample № ${num} · Base`
    : `Sample № ${num}`;

  const feats = parseFeatures(sample.features);
  const sigHTML = feats.length
    ? `<div class="sig-label">Significance</div>
       <ul class="sig-list">${feats.map(f => `<li>${esc(f)}</li>`).join("")}</ul>`
    : "";

  const photoHTML = sample.image
    ? `<div class="photo" style="background-image:url('${String(sample.image).replace(/'/g, "%27")}')"></div>`
    : `<div class="photo empty">No image on file</div>`;

  return `
    <div class="eyebrow"><span>${label}</span><span>${coords}</span></div>
    <hr class="rule" />
    <div class="name">${esc(sample.name) || "Untitled"}</div>
    <div class="notes">${esc(sample.notes)}</div>
    ${sigHTML}
    ${photoHTML}`;
}

// ── LOAD + RUN SEQUENCE ────────────────────────────────
const slideEl   = document.getElementById("slide");
const statusEl  = document.getElementById("status");
const counterEl = document.getElementById("counter");

let samples = [];
let current = 0;

function showSlide(i) {
  const s = samples[i];
  slideEl.innerHTML = slideHTML(s, i);
  counterEl.textContent =
    String(i + 1).padStart(3, "0") + " / " + String(samples.length).padStart(3, "0");

  // Pre-load the next sample's photo so the cut is instant
  const next = samples[(i + 1) % samples.length];
  if (next && next.image) {
    const pre = new Image();
    pre.src = next.image;
  }
}

Papa.parse(CSV_URL + (CSV_URL.includes("?") ? "&" : "?") + "cb=" + Date.now(), {
  download: true,
  header: true,
  skipEmptyLines: true,
  complete: (res) => {
    samples = res.data
      .map(normalizeRow)
      .filter(s => Number.isFinite(s.lat) && Number.isFinite(s.lng));

    if (!samples.length) {
      statusEl.textContent = "No samples found — check sheet.";
      return;
    }

    statusEl.style.display = "none";
    showSlide(0);

    if (samples.length > 1) {
      setInterval(() => {
        current = (current + 1) % samples.length;
        showSlide(current);
      }, HOLD_MS);
    }
  },
  error: () => {
    statusEl.textContent = "Load error — check CSV URL.";
  }
});
</script>
</body>
</html>
